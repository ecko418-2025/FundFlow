<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2A54" />
      <stop offset="100%" stop-color="#FF5E62" />
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2A54" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#FF2A54" stop-opacity="0.0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Area under the trend line -->
  <path d="M 2 24 L 10 17 L 18 19 L 30 5 L 30 28 L 2 28 Z" fill="url(#areaGrad)" />

  <!-- Trend Line -->
  <path d="M 2 24 L 10 17 L 18 19 L 30 5" stroke="url(#redGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Arrow Head -->
  <path d="M 22 5 L 30 5 L 30 13" stroke="url(#redGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Accent dot at peak -->
  <circle cx="30" cy="5" r="2" fill="#FFFFFF" />
</svg>